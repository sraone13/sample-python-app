name: sra1-app

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_RESOURCE_GROUP: sravan-aks-rg
  AZURE_CONTAINER_REGISTRY: sravanaksregistry
  CONTAINER_NAME: myapp
  CLUSTER_NAME: sravan-aks
  CLUSTER_RESOURCE_GROUP: sravan-aks-rg
  CLUSTER_RESOURCE_TYPE: Microsoft.ContainerService/managedClusters
  DEPLOYMENT_MANIFEST_PATH: ./manifests
  NAMESPACE: namespace-workflow

jobs:
  buildImage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $AZURE_CONTAINER_REGISTRY

      - name: Build Docker Image
        run: |
          docker build -t $AZURE_CONTAINER_REGISTRY.azurecr.io/$CONTAINER_NAME:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push $AZURE_CONTAINER_REGISTRY.azurecr.io/$CONTAINER_NAME:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: buildImage

    steps:
      - uses: actions/checkout@v3

      # ✅ IMPORTANT (you missed this earlier)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1

      - name: Get AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: $CLUSTER_RESOURCE_GROUP
          cluster-name: $CLUSTER_NAME

      - name: Deploy to AKS
        run: |
          kubectl create deployment myapp \
            --image=$AZURE_CONTAINER_REGISTRY.azurecr.io/$CONTAINER_NAME:${{ github.sha }} \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl expose deployment myapp \
            --type=LoadBalancer \
            --port=80 \
            --target-port=5000 \
            --dry-run=client -o yaml | kubectl apply -f -
