apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sra1-app
  labels:
    app.kubernetes.io/name: sra1-app
    app.kubernetes.io/part-of: sra1-app-project
    kubernetes.azure.com/generator: devhub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sra1-app
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80